version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tripplanner-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - tripplanner-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Local LLM (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: tripplanner-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - tripplanner-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Pull the default LLM model on first startup (runs once)
  # To use a different model, change OLLAMA_MODEL here and in the web service environment
  ollama-model-init:
    image: curlimages/curl:latest
    container_name: tripplanner-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - tripplanner-network
    command: ["-sf", "-X", "POST", "http://ollama:11434/api/pull", "-d", "{\"name\":\"llama3.2\"}", "--max-time", "600"]
    restart: "no"

  # TripPlanner Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripplanner-web
    ports:
      - "8980:8080"
      - "8981:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TripPlannerDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Ollama__BaseUrl=http://ollama:11434
      - Ollama__Model=llama3.2
    depends_on:
      sqlserver:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - tripplanner-network
    restart: unless-stopped

networks:
  tripplanner-network:
    driver: bridge

volumes:
  sqlserver-data:
  ollama-models:

